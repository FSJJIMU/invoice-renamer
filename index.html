<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日払い請求書リネームツール｜FIVE-STAR JAPAN</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  :root {
    --bg:      #0a0a0a;
    --panel:   #111111;
    --card:    #161616;
    --border:  #242424;
    --accent:  #E8C547;
    --accent2: #c9a82e;
    --blue:    #3eb8c8;
    --danger:  #e05252;
    --success: #3dba5f;
    --text:    #f0f0f0;
    --muted:   #555555;
    --muted2:  #888888;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Yu Gothic UI', 'Meiryo', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── HEADER ── */
  header {
    background: var(--panel);
    padding: 0 28px;
    height: 64px;
    display: flex;
    align-items: center;
    border-bottom: 2px solid var(--accent);
    flex-shrink: 0;
  }
  .header-label {
    font-family: 'Courier New', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 0.08em;
    margin-bottom: 2px;
  }
  .header-title {
    font-size: 19px;
    font-weight: 700;
    color: var(--text);
  }

  /* ── MODE SWITCH ── */
  .mode-switch {
    display: flex;
    align-items: center;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 3px;
    gap: 3px;
    margin-left: 24px;
  }
  .mode-btn {
    font-family: 'Yu Gothic UI', sans-serif;
    font-size: 12px;
    font-weight: 600;
    padding: 5px 14px;
    border-radius: 4px;
    border: none;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    white-space: nowrap;
    background: transparent;
    color: var(--muted2);
  }
  .mode-btn.active { background: var(--accent); color: #000; }

  /* ── MAIN ── */
  main {
    flex: 1;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    max-width: 1300px;
    width: 100%;
    margin: 0 auto;
  }

  /* ── DROPZONE ── */
  #dropzone {
    background: var(--card);
    border: 1.5px dashed var(--border);
    border-radius: 10px;
    height: 110px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    position: relative;
    overflow: hidden;
    flex-shrink: 0;
  }
  #dropzone:hover, #dropzone.drag-over {
    border-color: var(--accent);
    background: #1a1800;
  }
  #dropzone-label {
    font-size: 15px;
    color: var(--muted2);
    pointer-events: none;
    user-select: none;
  }
  #file-input { display: none; }

  /* ── PROGRESS ── */
  #prog-wrap { display: none; flex-direction: column; gap: 4px; }
  #prog-bar-bg {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  #prog-bar {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.2s;
  }
  #prog-label {
    font-family: 'Courier New', monospace;
    font-size: 12px;
    color: var(--muted2);
    text-align: center;
  }

  /* ── TABLE HEADER ── */
  #table-meta {
    display: flex;
    align-items: center;
    gap: 12px;
    height: 36px;
  }
  #count-lbl {
    font-family: 'Courier New', monospace;
    font-size: 13px;
    font-weight: 700;
    color: var(--accent);
  }
  #dup-lbl {
    font-size: 13px;
    font-weight: 700;
    color: var(--danger);
  }

  .col-header {
    background: var(--panel);
    border-radius: 4px;
    display: grid;
    grid-template-columns: 180px 130px 85px 90px 150px 80px 1fr 36px;
    align-items: center;
    padding: 0 10px;
    height: 30px;
    gap: 8px;
    flex-shrink: 0;
  }
  .col-header span {
    font-family: 'Courier New', monospace;
    font-size: 11px;
    color: var(--muted2);
  }

  /* ── ROWS ── */
  #rows-container {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 3px;
    min-height: 0;
  }

  .pdf-row {
    background: var(--card);
    border-radius: 6px;
    display: grid;
    grid-template-columns: 180px 130px 85px 90px 150px 80px 1fr 36px;
    align-items: center;
    padding: 0 10px;
    height: 52px;
    gap: 8px;
    flex-shrink: 0;
  }
  .pdf-row:nth-child(even) { background: var(--panel); }

  /* 元ファイル名セル */
  .cell-orig {
    display: flex;
    flex-direction: column;
    justify-content: center;
    overflow: hidden;
  }
  .cell-orig .fname {
    font-family: 'Courier New', monospace;
    font-size: 11px;
    color: var(--muted2);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .cell-orig .tag-status {
    font-family: 'Courier New', monospace;
    font-size: 11px;
    white-space: nowrap;
  }
  .tag-ok  { color: var(--success); }
  .tag-ng  { color: var(--danger); }
  .tag-warn{ color: #f0a020; }

  /* Inputs */
  input[type="text"], input[type="number"] {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: 'Yu Gothic UI', sans-serif;
    font-size: 13px;
    padding: 0 8px;
    height: 30px;
    width: 100%;
    outline: none;
    transition: border-color 0.15s;
  }
  input[type="number"] {
    font-family: 'Courier New', monospace;
    text-align: right;
  }
  input:focus { border-color: var(--accent); }

  /* 請求の有無ボタン */
  .x-btn {
    height: 28px;
    border-radius: 5px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--muted2);
    font-family: 'Courier New', monospace;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    width: 100%;
    white-space: nowrap;
  }
  .x-btn.is-x {
    background: #2d1a1a;
    border-color: var(--danger);
    color: var(--danger);
  }

  /* 訂正分チェック */
  .corr-wrap {
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
  }
  .corr-wrap input[type="checkbox"] {
    accent-color: var(--accent);
    width: 16px;
    height: 16px;
    cursor: pointer;
  }
  .corr-wrap span {
    font-size: 12px;
    color: var(--muted2);
    user-select: none;
  }

  /* プレビュー */
  .cell-preview {
    font-family: 'Courier New', monospace;
    font-size: 12px;
    color: var(--blue);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .cell-preview.is-x { color: var(--danger); }

  /* 削除ボタン */
  .del-btn {
    background: transparent;
    border: none;
    color: var(--muted);
    font-size: 16px;
    cursor: pointer;
    border-radius: 4px;
    width: 28px;
    height: 28px;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, color 0.15s;
  }
  .del-btn:hover { background: var(--border); color: var(--danger); }

  /* ── FOOTER ── */
  footer {
    background: var(--panel);
    border-top: 1px solid var(--border);
    height: 70px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    flex-shrink: 0;
  }
  #exec-btn {
    background: var(--accent);
    color: #000;
    font-family: 'Yu Gothic UI', sans-serif;
    font-size: 16px;
    font-weight: 700;
    border: none;
    border-radius: 8px;
    padding: 0 32px;
    height: 42px;
    cursor: pointer;
    transition: background 0.15s, opacity 0.15s;
  }
  #exec-btn:hover:not(:disabled) { background: var(--accent2); }
  #exec-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  #dl-one-btn, #dl-zip-btn {
    font-family: 'Yu Gothic UI', sans-serif;
    font-size: 15px;
    font-weight: 700;
    border-radius: 8px;
    padding: 0 28px;
    height: 42px;
    cursor: pointer;
    transition: background 0.15s, opacity 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #dl-one-btn {
    background: var(--accent);
    color: #000;
    border: none;
  }
  #dl-one-btn:hover:not(:disabled) { background: var(--accent2); }
  #dl-zip-btn {
    background: var(--card);
    color: var(--accent);
    border: 1px solid var(--accent);
  }
  #dl-zip-btn:hover:not(:disabled) { background: #1a1800; }
  #dl-one-btn:disabled, #dl-zip-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  #back-btn {
    background: transparent;
    color: var(--muted2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0 16px;
    height: 42px;
    font-family: 'Yu Gothic UI', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #back-btn:hover { background: var(--border); color: var(--text); }

  #status-lbl {
    font-family: 'Courier New', monospace;
    font-size: 12px;
    color: var(--muted2);
  }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

  /* ── EMPTY STATE ── */
  #empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    color: var(--muted);
    font-size: 14px;
    gap: 8px;
    padding: 40px;
  }
  #empty-state .icon { font-size: 40px; opacity: 0.4; }

  /* ── 最終請求モード ── */
  .col-header-final {
    background: var(--panel);
    border-radius: 4px;
    display: grid;
    grid-template-columns: 200px 200px 120px 1fr 36px;
    align-items: center;
    padding: 0 10px;
    height: 30px;
    gap: 8px;
    flex-shrink: 0;
  }
  .col-header-final span {
    font-family: 'Courier New', monospace;
    font-size: 11px;
    color: var(--muted2);
  }
  .pdf-row-final {
    background: var(--card);
    border-radius: 6px;
    display: grid;
    grid-template-columns: 200px 200px 120px 1fr 36px;
    align-items: center;
    padding: 0 10px;
    height: 52px;
    gap: 8px;
    flex-shrink: 0;
  }
  .pdf-row-final:nth-child(even) { background: var(--panel); }

  /* date input */
  input[type="text"].date-input {
    color: var(--blue);
    font-family: 'Courier New', monospace;
    font-size: 11px;
  }
  input::placeholder { color: var(--muted); }
</style>
</head>
<body>

<header>
  <div>
    <div class="header-label">FIVE-STAR JAPAN</div>
    <div class="header-title" id="header-title">日払い請求書リネームツール</div>
  </div>
  <div class="mode-switch">
    <button class="mode-btn active" id="btn-daily">日払い請求書</button>
    <button class="mode-btn" id="btn-horyuu">保留確定請求書</button>
    <button class="mode-btn" id="btn-final">最終請求</button>
  </div>
</header>

<main>
  <!-- DROPZONE -->
  <div id="dropzone" onclick="document.getElementById('file-input').click()">
    <span id="dropzone-label">📄 &nbsp; PDFをここにドラッグ＆ドロップ　／　クリックしてファイルを選択</span>
    <input type="file" id="file-input" accept=".pdf" multiple>
  </div>

  <!-- PROGRESS -->
  <div id="prog-wrap">
    <div id="prog-bar-bg"><div id="prog-bar"></div></div>
    <div id="prog-label"></div>
  </div>

  <!-- TABLE META -->
  <div id="table-meta">
    <span id="count-lbl"></span>
    <span id="dup-lbl"></span>
    <div id="bulk-month-wrap" style="display:none; align-items:center; gap:8px; margin-left:auto;">
      <span style="font-size:12px; color:var(--muted2); font-family:'Courier New',monospace;">対象月を一括変更：</span>
      <input type="number" id="bulk-month-input" min="1" max="12" placeholder="月"
        style="width:60px; height:28px; text-align:center; font-family:'Courier New',monospace;">
      <button id="bulk-month-btn"
        style="height:28px; padding:0 14px; background:var(--accent); color:#000;
               font-family:'Yu Gothic UI',sans-serif; font-size:12px; font-weight:700;
               border:none; border-radius:4px; cursor:pointer;">
        一括適用
      </button>
      <span style="font-size:12px; color:var(--border); margin:0 4px;">｜</span>
      <span style="font-size:12px; color:var(--muted2); font-family:'Courier New',monospace;">発行日を一括変更：</span>
      <input type="text" id="bulk-date-input" placeholder="yyyymmdd" maxlength="8"
        style="width:100px; height:28px; text-align:center; font-family:'Courier New',monospace; color:var(--blue);">
      <button id="bulk-date-cal-btn"
        style="height:28px; padding:0 10px; background:var(--bg); color:var(--accent);
               font-family:'Yu Gothic UI',sans-serif; font-size:11px; font-weight:600;
               border:1px solid var(--border); border-radius:4px; cursor:pointer;">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="1" y="2" width="12" height="11" rx="1.5" stroke="#E8C547" stroke-width="1.2"/>
          <line x1="1" y1="5.5" x2="13" y2="5.5" stroke="#E8C547" stroke-width="1.2"/>
          <line x1="4" y1="1" x2="4" y2="4" stroke="#E8C547" stroke-width="1.2" stroke-linecap="round"/>
          <line x1="10" y1="1" x2="10" y2="4" stroke="#E8C547" stroke-width="1.2" stroke-linecap="round"/>
          <rect x="3.5" y="7.5" width="2" height="2" rx="0.3" fill="#E8C547"/>
          <rect x="6.5" y="7.5" width="2" height="2" rx="0.3" fill="#E8C547"/>
          <rect x="9.5" y="7.5" width="2" height="2" rx="0.3" fill="#E8C547"/>
        </svg>
      </button>
      <button id="bulk-date-btn"
        style="height:28px; padding:0 14px; background:var(--accent); color:#000;
               font-family:'Yu Gothic UI',sans-serif; font-size:12px; font-weight:700;
               border:none; border-radius:4px; cursor:pointer;">
        一括適用
      </button>
    </div>
  </div>

  <!-- COL HEADER 日払い -->
  <div class="col-header" id="col-header-daily">
    <span>元ファイル名</span>
    <span>請求書名義</span>
    <span>請求金額</span>
    <span>請求の有無</span>
    <span>日付</span>
    <span>訂正分</span>
    <span>新ファイル名プレビュー</span>
    <span></span>
  </div>

  <!-- COL HEADER 最終請求 -->
  <div class="col-header-final" id="col-header-final" style="display:none;">
    <span>元ファイル名</span>
    <span>請求書名義</span>
    <span>対象月</span>
    <span>新ファイル名プレビュー</span>
    <span></span>
  </div>

  <!-- COL HEADER 保留確定 -->
  <div class="col-header" id="col-header-horyuu" style="display:none;">
    <span>元ファイル名</span>
    <span>請求書名義</span>
    <span>請求金額</span>
    <span>請求の有無</span>
    <span>日付</span>
    <span>訂正分</span>
    <span>新ファイル名プレビュー</span>
    <span></span>
  </div>
  <div id="rows-container"></div>
</main>

<footer>
  <div id="footer-rename">
    <button id="exec-btn" disabled>▶ &nbsp; リネーム実行</button>
  </div>
  <div id="footer-dl" style="display:none; align-items:center; gap:16px;">
    <button id="dl-one-btn">1件ずつダウンロード</button>
    <button id="dl-zip-btn">ZIPにまとめてダウンロード</button>
    <button id="back-btn">戻る</button>
  </div>
  <span id="status-lbl"></span>
</footer>

<script>
// PDF.js worker設定
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ── State ──
let pdfRows = [];
let currentMode = 'daily'; // 'daily' | 'final'

// ── DOM refs ──
const dropzone      = document.getElementById('dropzone');
const fileInput     = document.getElementById('file-input');
const progWrap      = document.getElementById('prog-wrap');
const progBar       = document.getElementById('prog-bar');
const progLabel     = document.getElementById('prog-label');
const countLbl      = document.getElementById('count-lbl');
const dupLbl        = document.getElementById('dup-lbl');
const rowsContainer = document.getElementById('rows-container');
const execBtn       = document.getElementById('exec-btn');
const footerRename  = document.getElementById('footer-rename');
const footerDl      = document.getElementById('footer-dl');
const dlOneBtn      = document.getElementById('dl-one-btn');
const dlZipBtn      = document.getElementById('dl-zip-btn');
const backBtn       = document.getElementById('back-btn');
const statusLbl     = document.getElementById('status-lbl');
const btnDaily      = document.getElementById('btn-daily');
const btnFinal      = document.getElementById('btn-final');
const btnHoryuu     = document.getElementById('btn-horyuu');
const headerTitle   = document.getElementById('header-title');
const colHeaderDaily  = document.getElementById('col-header-daily');
const colHeaderFinal  = document.getElementById('col-header-final');
const colHeaderHoryuu = document.getElementById('col-header-horyuu');
const bulkMonthWrap  = document.getElementById('bulk-month-wrap');
const bulkMonthInput = document.getElementById('bulk-month-input');
const bulkMonthBtn   = document.getElementById('bulk-month-btn');
const bulkDateInput  = document.getElementById('bulk-date-input');
const bulkDateCalBtn = document.getElementById('bulk-date-cal-btn');
const bulkDateBtn    = document.getElementById('bulk-date-btn');

// ── モード切替 ──
function switchMode(mode) {
  currentMode = mode;
  pdfRows = [];
  bulkIssueDate = null;
  rowsContainer.innerHTML = '';
  execBtn.disabled = true;
  countLbl.textContent = '';
  dupLbl.textContent = '';
  statusLbl.textContent = '';
  footerDl.style.display = 'none';
  footerRename.style.display = 'flex';

  if (mode === 'daily') {
    btnDaily.classList.add('active');
    btnFinal.classList.remove('active');
    btnHoryuu.classList.remove('active');
    headerTitle.textContent = '日払い請求書リネームツール';
    colHeaderDaily.style.display = '';
    colHeaderFinal.style.display = 'none';
    colHeaderHoryuu.style.display = 'none';
    bulkMonthWrap.style.display = 'none';
  } else if (mode === 'final') {
    btnFinal.classList.add('active');
    btnDaily.classList.remove('active');
    btnHoryuu.classList.remove('active');
    headerTitle.textContent = '最終請求リネームツール';
    colHeaderDaily.style.display = 'none';
    colHeaderFinal.style.display = '';
    colHeaderHoryuu.style.display = 'none';
    bulkMonthWrap.style.display = 'flex';
  } else {
    btnHoryuu.classList.add('active');
    btnDaily.classList.remove('active');
    btnFinal.classList.remove('active');
    headerTitle.textContent = '保留確定請求書リネームツール';
    colHeaderDaily.style.display = 'none';
    colHeaderFinal.style.display = 'none';
    colHeaderHoryuu.style.display = '';
    bulkMonthWrap.style.display = 'none';
  }
}
btnDaily.addEventListener('click', () => switchMode('daily'));
btnFinal.addEventListener('click', () => switchMode('final'));
btnHoryuu.addEventListener('click', () => switchMode('horyuu'));

// ── 対象月 一括適用 ──
bulkMonthBtn.addEventListener('click', () => {
  const m = parseInt(bulkMonthInput.value, 10);
  if (!m || m < 1 || m > 12) return;
  pdfRows.forEach(r => { r.month = m; });
  rowsContainer.querySelectorAll('.month-input').forEach(input => { input.value = m; });
  rowsContainer.querySelectorAll('.pdf-row-final').forEach((row, idx) => {
    const preview = row.querySelector('.cell-preview');
    if (preview) {
      const fn = buildFilenameFinal(pdfRows[idx].name, m);
      preview.textContent = fn;
      preview.title = fn;
    }
  });
});

// ── 一括日付カレンダー ──
bulkDateCalBtn.addEventListener('click', () => {
  // StringVar風のラッパーオブジェクトをカレンダーに渡す
  const fakeVar = {
    _val: bulkDateInput.value,
    get() { return this._val; },
    set(v) { this._val = v; bulkDateInput.value = v; }
  };
  openCalendar(document.body, fakeVar);
});

// ── 発行日 一括適用 ──
bulkDateBtn.addEventListener('click', () => {
  const d = bulkDateInput.value.trim();
  if (!/^\d{8}$/.test(d)) {
    bulkDateInput.style.borderColor = 'var(--danger)';
    return;
  }
  bulkDateInput.style.borderColor = '';
  bulkIssueDate = d;
  // 全行のプレビューを更新
  rowsContainer.querySelectorAll('.pdf-row-final').forEach((row, idx) => {
    const preview = row.querySelector('.cell-preview');
    if (preview) {
      const fn = buildFilenameFinal(pdfRows[idx].name, pdfRows[idx].month);
      preview.textContent = fn;
      preview.title = fn;
    }
  });
});

// ── Drag & Drop ──
dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('drag-over'); });
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag-over'));
dropzone.addEventListener('drop', e => {
  e.preventDefault();
  dropzone.classList.remove('drag-over');
  const files = [...e.dataTransfer.files].filter(f => f.name.toLowerCase().endsWith('.pdf'));
  if (files.length) processFiles(files);
});
fileInput.addEventListener('change', () => {
  const files = [...fileInput.files];
  if (files.length) processFiles(files);
  fileInput.value = '';
});

// ── テキスト正規化 ──
function normalize(text) {
  // 全角スペース・半角スペース除去
  text = text.replace(/[\s\u3000]/g, '');
  // 全角記号→半角
  text = text.replace(/＃/g, '#').replace(/：/g, ':');
  // 全角数字→半角
  text = text.replace(/[０-９]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0));
  return text;
}

// ── タグパース ──
function parseTag(rawText) {
  const c = normalize(rawText);
  const idx = c.indexOf('##INV');
  const raw = idx >= 0 ? c.slice(idx, idx + 70) : '（タグなし）';

  // 保留確定パターン: ##INV:名前:金額:日付:保留確定##
  let m = c.match(/##INV:([^:#]+):(-?\d+):(\d{8}):保留確定##/i);
  if (m) return { name: m[1], amount: parseInt(m[2]), date: m[3], found: true, isHoryuu: true, raw };

  m = c.match(/##INV:([^:#]+):(-?\d+):(\d{7}):保留確定##/i);
  if (m) {
    const d = m[3];
    const date = d.slice(0, 4) + '0' + d.slice(4);
    return { name: m[1], amount: parseInt(m[2]), date, found: true, isHoryuu: true, raw };
  }

  // パターン1: 8桁日付
  m = c.match(/##INV:([^:#]+):(-?\d+):(\d{8})##/i);
  if (m) return { name: m[1], amount: parseInt(m[2]), date: m[3], found: true, isHoryuu: false, raw };

  // パターン2: 7桁日付（月が1桁）→ 0補完
  m = c.match(/##INV:([^:#]+):(-?\d+):(\d{7})##/i);
  if (m) {
    const d = m[3];
    const date = d.slice(0, 4) + '0' + d.slice(4);
    return { name: m[1], amount: parseInt(m[2]), date, found: true, isHoryuu: false, raw };
  }

  // パターン3: 日付なし
  m = c.match(/##INV:([^:#]+):(-?\d+)##/i);
  if (m) return { name: m[1], amount: parseInt(m[2]), date: null, found: true, isHoryuu: false, raw };

  return { name: '', amount: -1, date: null, found: false, isHoryuu: false, raw };
}

// ── PDF テキスト抽出 ──
async function extractText(file) {
  try {
    const arrayBuffer = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
    let text = '';
    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const content = await page.getTextContent();
      text += content.items.map(item => item.str).join('');
    }
    return text;
  } catch (e) {
    return '';
  }
}

// ── ファイル名生成（日払い） ──
function buildFilename(name, amount, date, isX, isCorrection, dupPrefix) {
  const prefix = isX ? '×' : '';
  const dateStr = date || '????????';
  let base = `${prefix}日払い請求書${dateStr}${name}様`;
  if (isCorrection) base += ' 訂正分';
  if (dupPrefix) base = dupPrefix + ' ' + base;
  return base + '.pdf';
}

// ── ファイル名生成（最終請求） ──
let bulkIssueDate = null; // null = 実行当日、'yyyymmdd' = 一括指定日

function buildFilenameFinal(name, month) {
  let dateStr;
  if (bulkIssueDate && bulkIssueDate.length === 8) {
    dateStr = bulkIssueDate;
  } else {
    const today = new Date();
    const yyyy = today.getFullYear();
    const mm   = String(today.getMonth() + 1).padStart(2, '0');
    const dd   = String(today.getDate()).padStart(2, '0');
    dateStr = `${yyyy}${mm}${dd}`;
  }
  const m = month ? parseInt(month, 10) : '?';
  return `${name}様 請求書 ${m}月最終請求 ${dateStr}.pdf`;
}

// ── ファイル名生成（保留確定） ──
function buildFilenameHoryuu(name, date) {
  const dateStr = date || '????????';
  return `保留確定請求書${dateStr}${name}様.pdf`;
}

// ── 重複検出 ──
function detectDuplicates(rows) {
  const nameCount = {};
  rows.forEach(r => {
    const key = buildFilename(r.name, r.amount, r.date, r.isX, r.isCorrection, '');
    nameCount[key] = (nameCount[key] || 0) + 1;
  });
  const tracker = {};
  let dupTotal = 0;
  rows.forEach(r => {
    const key = buildFilename(r.name, r.amount, r.date, r.isX, r.isCorrection, '');
    if (nameCount[key] > 1) {
      tracker[key] = (tracker[key] || 0) + 1;
      r.dupPrefix = tracker[key] === 1 ? '' : `※重複データ${tracker[key] - 1}`;
      if (tracker[key] > 1) dupTotal++;
    } else {
      r.dupPrefix = '';
    }
  });
  return dupTotal;
}

// ── ファイル処理 ──
async function processFiles(files) {
  pdfRows = [];
  rowsContainer.innerHTML = '';
  execBtn.disabled = true;
  statusLbl.textContent = '';
  countLbl.textContent = '解析中…';
  dupLbl.textContent = '';
  progWrap.style.display = 'flex';
  progBar.style.width = '0%';

  for (let i = 0; i < files.length; i++) {
    const f = files[i];
    progBar.style.width = `${Math.round(i / files.length * 100)}%`;
    progLabel.textContent = `解析中 ${i + 1}/${files.length}  ${f.name}`;

    const text = await extractText(f);
    const p = parseTag(text);

    // タグ日付から月を抽出（例: 20260331 → '03' → 3）
    const month = (p.date && p.date.length >= 6) ? parseInt(p.date.slice(4, 6), 10) : null;

    pdfRows.push({
      file: f,
      orig: f.name,
      name: p.name,
      amount: p.amount,
      date: p.date,
      month: month,
      isX: p.amount === 0,
      isCorrection: false,
      isHoryuu: p.isHoryuu,
      found: p.found,
      raw: p.raw,
      dupPrefix: ''
    });
  }

  progBar.style.width = '100%';
  progLabel.textContent = '';
  setTimeout(() => { progWrap.style.display = 'none'; }, 400);

  renderRows();
}

// ── レンダリング ──
function renderRows() {
  rowsContainer.innerHTML = '';
  if (pdfRows.length === 0) {
    countLbl.textContent = '';
    dupLbl.textContent = '';
    execBtn.disabled = true;
    return;
  }

  const found = pdfRows.filter(r => r.found).length;
  const notFound = pdfRows.length - found;
  countLbl.textContent = `  ${found}件 タグ自動検出` + (notFound ? `  ／  ${notFound}件 タグなし` : '');

  if (currentMode === 'final') {
    pdfRows.forEach((r, idx) => addRowFinal(idx));
    execBtn.disabled = !pdfRows.some(r => r.name);
    dupLbl.textContent = '';
  } else if (currentMode === 'horyuu') {
    // 保留確定モード：保留確定タグがないものはエラー表示
    pdfRows.forEach((r, idx) => addRowHoryuu(idx));
    execBtn.disabled = !pdfRows.some(r => r.isHoryuu && r.name && r.date);
    dupLbl.textContent = '';
  } else {
    // 日払いモード
    const dupTotal = detectDuplicates(pdfRows);
    dupLbl.textContent = dupTotal > 0 ? `  ⚠ 重複データが ${dupTotal} 件あります。ご確認ください。` : '';
    pdfRows.forEach((r, idx) => addRow(idx));
    execBtn.disabled = !pdfRows.some(r => !r.isHoryuu && r.name && r.date);
  }
}

function addRow(idx) {
  const r = pdfRows[idx];

  const row = document.createElement('div');
  row.className = 'pdf-row';
  row.dataset.idx = idx;

  // 保留確定タグが含まれている場合はエラー表示
  if (r.isHoryuu) {
    row.innerHTML = `
      <div class="cell-orig">
        <div class="fname" title="${r.orig}">${r.orig.length > 22 ? r.orig.slice(0,22)+'…' : r.orig}</div>
        <div class="tag-status tag-ng">✗ 保留確定タグ検出</div>
      </div>
      <div style="grid-column:2/8; display:flex; align-items:center;">
        <span style="color:var(--danger); font-size:13px; font-weight:700;">こちらは保留確定請求書です。日払い請求書ではありません。</span>
      </div>
      <div><button class="del-btn" title="削除">✕</button></div>
    `;
    row.querySelector('.del-btn').addEventListener('click', () => { pdfRows.splice(idx, 1); renderRows(); });
    rowsContainer.appendChild(row);
    return;
  }

  const fname = buildFilename(r.name, r.amount, r.date, r.isX, r.isCorrection, r.dupPrefix);

  row.className = 'pdf-row';
  row.dataset.idx = idx;

  // タグ状態テキスト
  let tagClass, tagText;
  if (r.found && r.date) { tagClass = 'tag-ok'; tagText = '✓ タグ検出  📅 ' + r.date; }
  else if (r.found)       { tagClass = 'tag-warn'; tagText = '✓ タグ検出  ⚠ 日付なし'; }
  else                     { tagClass = 'tag-ng'; tagText = '✗ タグなし'; }

  const amtDisplay = r.amount !== -1 ? r.amount : '';
  const isXClass = r.isX ? 'is-x' : '';
  const xText = r.isX ? '請求なし' : '請求あり';
  const prevClass = (r.isX || r.dupPrefix) ? 'is-x' : '';

  row.innerHTML = `
    <div class="cell-orig">
      <div class="fname" title="${r.orig}">${r.orig.length > 22 ? r.orig.slice(0,22)+'…' : r.orig}</div>
      <div class="tag-status ${tagClass}">${tagText}</div>
    </div>
    <div><input type="text" class="name-input" value="${escHtml(r.name)}" placeholder="担当者名"></div>
    <div><input type="number" class="amt-input" value="${amtDisplay}" placeholder="0"></div>
    <div><button class="x-btn ${isXClass}">${xText}</button></div>
    <div><input type="text" class="date-input" value="${r.date || ''}" placeholder="yyyymmdd" maxlength="8"></div>
    <div>
      <label class="corr-wrap">
        <input type="checkbox" class="corr-check" ${r.isCorrection ? 'checked' : ''}>
        <span>訂正分</span>
      </label>
    </div>
    <div class="cell-preview ${prevClass}" title="${fname}">${fname}</div>
    <div><button class="del-btn" title="削除">✕</button></div>
  `;

  // Event listeners
  const nameInput = row.querySelector('.name-input');
  const amtInput  = row.querySelector('.amt-input');
  const dateInput = row.querySelector('.date-input');
  const xBtn      = row.querySelector('.x-btn');
  const corrCheck = row.querySelector('.corr-check');
  const preview   = row.querySelector('.cell-preview');
  const delBtn    = row.querySelector('.del-btn');

  const refresh = () => {
    const name = nameInput.value.trim();
    const amt  = amtInput.value !== '' ? parseInt(amtInput.value) : -1;
    const date = dateInput.value.trim() || null;
    const isX  = r.isX;
    const isC  = corrCheck.checked;

    pdfRows[idx].name = name;
    pdfRows[idx].amount = amt;
    pdfRows[idx].date = date;
    pdfRows[idx].isCorrection = isC;
    if (amt === 0 && !isX) { pdfRows[idx].isX = true; }

    detectDuplicates(pdfRows);
    const fn = buildFilename(pdfRows[idx].name, pdfRows[idx].amount, pdfRows[idx].date,
                              pdfRows[idx].isX, pdfRows[idx].isCorrection, pdfRows[idx].dupPrefix);
    preview.textContent = fn;
    preview.title = fn;
    preview.className = 'cell-preview' + ((pdfRows[idx].isX || pdfRows[idx].dupPrefix) ? ' is-x' : '');

    const ready = pdfRows.some(r => r.name && r.date);
    execBtn.disabled = !ready;

    const dupTotal = pdfRows.filter(r => r.dupPrefix && r.dupPrefix !== '').length;
    dupLbl.textContent = dupTotal > 0 ? `  ⚠ 重複データが ${dupTotal} 件あります。ご確認ください。` : '';
  };

  xBtn.addEventListener('click', () => {
    pdfRows[idx].isX = !pdfRows[idx].isX;
    xBtn.textContent = pdfRows[idx].isX ? '請求なし' : '請求あり';
    xBtn.className = 'x-btn' + (pdfRows[idx].isX ? ' is-x' : '');
    refresh();
  });

  nameInput.addEventListener('input', refresh);
  amtInput.addEventListener('input', refresh);
  dateInput.addEventListener('input', refresh);
  corrCheck.addEventListener('change', refresh);

  delBtn.addEventListener('click', () => {
    pdfRows.splice(idx, 1);
    renderRows();
  });

  rowsContainer.appendChild(row);
}

// ── 行追加（最終請求モード） ──

  else                      { tagClass = 'tag-ng'; tagText = '✗ タグなし'; }

  row.innerHTML = `
    <div class="cell-orig">
      <div class="fname" title="${r.orig}">${r.orig.length > 26 ? r.orig.slice(0,26)+'…' : r.orig}</div>

// ── 行追加（保留確定モード） ──

  const r = pdfRows[idx];

  const row = document.createElement('div');
  row.className = 'pdf-row';
  row.dataset.idx = idx;

  // 保留確定タグがない場合はエラー行

    row.innerHTML = `
      <div class="cell-orig">
        <div class="fname" title="${r.orig}">${r.orig.length > 22 ? r.orig.slice(0,22)+'…' : r.orig}</div>

  dateInput.addEventListener('input', refresh);
  delBtn.addEventListener('click', () => { pdfRows.splice(idx, 1); renderRows(); });

  rowsContainer.appendChild(row);

// ── ダウンロード（個別） ──
function downloadFile(r) {
  const fn = currentMode === 'final'
    ? buildFilenameFinal(r.name, r.month)
    : currentMode === 'horyuu'
    ? buildFilenameHoryuu(r.name, r.date)
    : buildFilename(r.name, r.amount, r.date, r.isX, r.isCorrection, r.dupPrefix);
  const url = URL.createObjectURL(r.file);
  const a = document.createElement('a');
  a.href = url;
  a.download = fn;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

// ── リネーム実行 → DLフェーズへ切り替え ──
execBtn.addEventListener('click', () => {
  const items = currentMode === 'final'
    ? pdfRows.filter(r => r.name)
    : currentMode === 'horyuu'
    ? pdfRows.filter(r => r.isHoryuu && r.name && r.date)
    : pdfRows.filter(r => !r.isHoryuu && r.name && r.date);
  if (!items.length) return;
  footerRename.style.display = 'none';
  footerDl.style.display = 'flex';
  statusLbl.textContent = '';
  statusLbl.style.color = 'var(--muted2)';
});

// ── 戻る ──
backBtn.addEventListener('click', () => {
  footerDl.style.display = 'none';
  footerRename.style.display = 'flex';
  statusLbl.textContent = '';
});

// ── 1件ずつダウンロード ──
dlOneBtn.addEventListener('click', async () => {
  const items = currentMode === 'final'
    ? pdfRows.filter(r => r.name)
    : currentMode === 'horyuu'
    ? pdfRows.filter(r => r.isHoryuu && r.name && r.date)
    : pdfRows.filter(r => !r.isHoryuu && r.name && r.date);
  if (!items.length) return;
  dlOneBtn.disabled = true;
  dlZipBtn.disabled = true;
  statusLbl.textContent = '処理中…';
  for (let i = 0; i < items.length; i++) {
    await new Promise(res => setTimeout(res, i === 0 ? 0 : 300));
    downloadFile(items[i]);
    statusLbl.textContent = `ダウンロード中 ${i + 1}/${items.length}`;
  }
  statusLbl.textContent = `✓  ${items.length}件 完了`;
  statusLbl.style.color = 'var(--success)';
  dlOneBtn.disabled = false;
  dlZipBtn.disabled = false;
});

// ── ZIPにまとめてDL ──
dlZipBtn.addEventListener('click', async () => {
  const items = currentMode === 'final'
    ? pdfRows.filter(r => r.name)
    : currentMode === 'horyuu'
    ? pdfRows.filter(r => r.isHoryuu && r.name && r.date)
    : pdfRows.filter(r => !r.isHoryuu && r.name && r.date);
  if (!items.length) return;
  if (!window.JSZip) {
    statusLbl.textContent = 'ZIPライブラリを読み込み中…';
    await loadScript('https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js');
  }
  statusLbl.textContent = 'ZIP作成中…';
  statusLbl.style.color = 'var(--muted2)';
  dlOneBtn.disabled = true;
  dlZipBtn.disabled = true;
  const zip = new JSZip();
  for (const r of items) {
    const fn = currentMode === 'final'
      ? buildFilenameFinal(r.name, r.month)
      : currentMode === 'horyuu'
      ? buildFilenameHoryuu(r.name, r.date)
      : buildFilename(r.name, r.amount, r.date, r.isX, r.isCorrection, r.dupPrefix);
    const buf = await r.file.arrayBuffer();
    zip.file(fn, buf);
  }
  const blob = await zip.generateAsync({ type: 'blob' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  if (currentMode === 'final') {
    const month = items[0].month || '?';
    a.download = `${month}月最終請求.zip`;
  } else if (currentMode === 'horyuu') {
    const firstDate = items[0].date || '';
    const day = firstDate.length >= 8 ? parseInt(firstDate.slice(6, 8)) : '';
    a.download = day ? `${day}日発行分.zip` : '保留確定請求書.zip';
  } else {
    const firstDate = items[0].date || '';
    const day = firstDate.length >= 8 ? parseInt(firstDate.slice(6, 8)) : '';
    a.download = day ? `${day}日稼働分.zip` : '日払い請求書.zip';
  }
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 2000);
  statusLbl.textContent = `✓  ZIP完了 (${items.length}件)`;
  statusLbl.style.color = 'var(--success)';
  dlOneBtn.disabled = false;
  dlZipBtn.disabled = false;
});

// ── Script動的ロード ──
function loadScript(src) {
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = src;
    s.onload = resolve;
    s.onerror = reject;
    document.head.appendChild(s);
  });
}

// ── カレンダーポップアップ ──
function openCalendar(anchorEl, dateVarObj, callback) {
  document.querySelectorAll('.cal-popup').forEach(e => e.remove());

  const current = dateVarObj.get();
  let selYear, selMonth, selDay;
  if (/^\d{8}$/.test(current)) {
    selYear  = parseInt(current.slice(0,4));
    selMonth = parseInt(current.slice(4,6)) - 1;
    selDay   = parseInt(current.slice(6,8));
  } else {
    const t = new Date();
    selYear = t.getFullYear(); selMonth = t.getMonth(); selDay = t.getDate();
  }
  let viewYear = selYear, viewMonth = selMonth;

  const DAYS   = ['月','火','水','木','金','土','日'];
  const MONTHS = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

  const pop = document.createElement('div');
  pop.className = 'cal-popup';
  pop.style.cssText = `position:fixed;z-index:9999;background:#0a0a0c;border:1px solid #1e2028;
    border-radius:8px;box-shadow:0 8px 32px rgba(0,0,0,0.7);user-select:none;min-width:260px;`;

  function render() {
    const today = new Date();
    const firstDay = new Date(viewYear, viewMonth, 1).getDay();
    const daysInMonth = new Date(viewYear, viewMonth+1, 0).getDate();
    const startCol = (firstDay + 6) % 7;
    let cells = [];
    for (let i = 0; i < startCol; i++) cells.push('');
    for (let d = 1; d <= daysInMonth; d++) cells.push(d);
    while (cells.length % 7 !== 0) cells.push('');

    let rows = '';
    for (let i = 0; i < cells.length; i += 7) {
      rows += '<tr>';
      for (let j = 0; j < 7; j++) {
        const d = cells[i+j];
        const isToday = d && viewYear===today.getFullYear() && viewMonth===today.getMonth() && d===today.getDate();
        const isSel   = d && viewYear===selYear && viewMonth===selMonth && d===selDay;
        const isSat = j===5, isSun = j===6;
        let bg = 'transparent', fg = isSat ? '#4ab8d4' : isSun ? '#e05252' : '#eef0f4';
        if (isSel)        { bg='#e8c547'; fg='#000'; }
        else if (isToday) { bg='#1e2028'; fg='#e8c547'; }
        rows += `<td data-d="${d||''}" style="width:34px;height:32px;text-align:center;border-radius:4px;cursor:${d?'pointer':'default'};background:${bg};color:${d?fg:'transparent'};font-size:13px;">${d||''}</td>`;
      }
      rows += '</tr>';
    }

    pop.innerHTML = `
      <div style="background:#111318;padding:10px 12px;display:flex;align-items:center;justify-content:space-between;border-radius:8px 8px 0 0;">
        <span class="cal-prev" style="cursor:pointer;font-size:18px;color:#eef0f4;padding:0 8px;">‹</span>
        <span style="font-size:13px;font-weight:700;color:#eef0f4;">${viewYear}年 ${MONTHS[viewMonth]}</span>
        <span class="cal-next" style="cursor:pointer;font-size:18px;color:#eef0f4;padding:0 8px;">›</span>
      </div>
      <div style="padding:8px 12px 12px;">
        <table style="border-collapse:collapse;width:100%;">
          <thead><tr>${DAYS.map((d,i)=>`<th style="font-size:10px;color:${i===5?'#4ab8d4':i===6?'#e05252':'#6b7280'};padding-bottom:4px;font-weight:400;">${d}</th>`).join('')}</tr></thead>
          <tbody>${rows}</tbody>
        </table>
        <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:8px;">
          <span class="cal-cancel" style="cursor:pointer;font-size:11px;color:#6b7280;padding:4px 8px;">キャンセル</span>
          <span class="cal-ok" style="cursor:pointer;font-size:11px;font-weight:700;background:#e8c547;color:#000;padding:4px 12px;border-radius:4px;">決　定</span>
        </div>
      </div>`;

    pop.querySelector('.cal-prev').onclick = () => { viewMonth--; if(viewMonth<0){viewMonth=11;viewYear--;} render(); };
    pop.querySelector('.cal-next').onclick = () => { viewMonth++; if(viewMonth>11){viewMonth=0;viewYear++;} render(); };
    pop.querySelectorAll('td[data-d]').forEach(td => {
      if (!td.dataset.d) return;
      td.onmouseenter = () => { if(!(viewYear===selYear&&viewMonth===selMonth&&parseInt(td.dataset.d)===selDay)) td.style.background='#16181f'; };
      td.onmouseleave = () => { if(!(viewYear===selYear&&viewMonth===selMonth&&parseInt(td.dataset.d)===selDay)) td.style.background='transparent'; };
      td.onclick = () => { selYear=viewYear; selMonth=viewMonth; selDay=parseInt(td.dataset.d); render(); };
    });
    pop.querySelector('.cal-ok').onclick = () => {
      const mm = String(selMonth+1).padStart(2,'0');
      const dd = String(selDay).padStart(2,'0');
      dateVarObj.set(`${selYear}${mm}${dd}`);
      if (callback) callback();
      pop.remove();
    };
    pop.querySelector('.cal-cancel').onclick = () => pop.remove();
  }

  render();
  document.body.appendChild(pop);
  pop.addEventListener('click', e => e.stopPropagation());
  pop.style.left = `${(window.innerWidth  - pop.offsetWidth)  / 2}px`;
  pop.style.top  = `${(window.innerHeight - pop.offsetHeight) / 2}px`;

  setTimeout(() => {
    document.addEventListener('click', function handler(e) {
      if (!pop.contains(e.target)) { pop.remove(); document.removeEventListener('click', handler); }
    });
  }, 0);
}

// ── エスケープ ──
function escHtml(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
