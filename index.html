<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>リネームツール</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600&family=JetBrains+Mono:wght@300;400;500&display=swap');

  :root {
    --bg:        #0a0a0a;
    --s1:        #101010;
    --s2:        #161616;
    --s3:        #1c1c1c;
    --s4:        #222222;
    --line:      #1e1e1e;
    --line2:     #2a2a2a;
    --line3:     #383838;
    --gold:      #e8c547;
    --gold2:     #c9a82e;
    --gold3:     #6b5010;
    --golddim:   rgba(232,197,71,0.08);
    --goldglow:  rgba(232,197,71,0.20);
    --teal:      #3eb8c8;
    --tealdim:   rgba(62,184,200,0.08);
    --red:       #e05252;
    --reddim:    rgba(224,82,82,0.09);
    --green:     #3dba5f;
    --orange:    #f0a020;
    --white:     #ebebeb;
    --g1:        #a0a0a0;
    --g2:        #606060;
    --g3:        #383838;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }

  body {
    background: var(--bg);
    color: var(--white);
    font-family: 'DM Sans', 'Noto Sans JP', 'Yu Gothic UI', sans-serif;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ═══════════════════ TOPBAR ═══════════════════ */
  /* ═══════════════════ APP SHELL ═══════════════════ */
  #app { flex: 1; display: flex; overflow: hidden; }

  /* ═══════════════════ SIDEBAR ═══════════════════ */
  #sidebar {
    width: 220px;
    flex-shrink: 0;
    background: var(--s1);
    border-right: 1px solid var(--line);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sb-logo {
    padding: 20px 24px;
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .sb-logo-icon {
    width: 44px;
    height: 44px;
    border-radius: 10px;
    overflow: hidden;
    flex-shrink: 0;
  }
  .sb-logo-icon img {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }
  .sb-logo-text { display: flex; flex-direction: column; gap: 3px; }
  .sb-logo-main {
    font-size: 15px;
    font-weight: 600;
    color: var(--white);
    letter-spacing: -0.01em;
    line-height: 1.2;
  }
  .sb-logo-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: #585858;
    letter-spacing: 0.16em;
    text-transform: uppercase;
  }

  .sb-section-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: #505050;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 20px 24px 8px;
  }

  .sb-nav { flex: 1; display: flex; flex-direction: column; padding: 4px 12px; gap: 2px; }

  .mode-btn {
    width: 100%;
    background: transparent;
    border: none;
    border-radius: 8px;
    padding: 10px 12px;
    cursor: pointer;
    text-align: left;
    transition: background 0.15s;
    display: flex;
    align-items: center;
    gap: 12px;
    position: relative;
  }
  .mode-btn:hover:not(.active) { background: var(--s2); }
  .mode-btn.active { background: var(--golddim); }

  .mode-btn-icon {
    width: 40px; height: 26px;
    border-radius: 4px;
    background: var(--s3);
    border: 1px solid var(--line2);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s;
    font-family: 'JetBrains Mono', monospace;
    font-size: 8px;
    font-weight: 500;
    letter-spacing: 0.06em;
    color: var(--g2);
  }
  .mode-btn.active .mode-btn-icon {
    background: var(--golddim);
    border-color: var(--gold2);
    color: var(--gold);
  }

  .mode-btn-text { display: flex; flex-direction: column; gap: 1px; }
  .mode-btn-name {
    font-size: 12px;
    font-weight: 500;
    color: #7a7a7a;
    transition: color 0.15s;
  }
  .mode-btn.active .mode-btn-name { color: var(--white); }

  /* ═══════════════════ WORKSPACE ═══════════════════ */
  #workspace {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--bg);
    position: relative;
  }

  /* ワークスペース ヘッダー */
  #ws-header {
    height: 60px;
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    padding: 0 28px;
    gap: 16px;
    flex-shrink: 0;
    position: relative;
  }
  #ws-mode-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.14em;
    color: var(--gold);
    background: var(--golddim);
    border: 1px solid var(--gold2);
    padding: 4px 10px;
    border-radius: 4px;
    text-transform: uppercase;
    flex-shrink: 0;
  }
  #header-title {
    font-size: 14px;
    font-weight: 500;
    color: var(--white);
  }
  #ws-count { margin-left: auto; display: flex; align-items: center; gap: 16px; }
  #count-lbl {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--gold);
    letter-spacing: 0.06em;
  }
  #dup-lbl {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--red);
    letter-spacing: 0.06em;
  }

  /* ドロップゾーン */
  #dropzone {
    margin: 20px 28px 0;
    background: var(--s2);
    border: 1px dashed #404040;
    border-radius: 10px;
    height: 84px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
    flex-shrink: 0;
    position: relative;
    overflow: hidden;
  }
  #dropzone::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 120%, var(--golddim), transparent 70%);
    opacity: 0;
    transition: opacity 0.2s;
  }
  #dropzone:hover::after, #dropzone.drag-over::after { opacity: 1; }
  #dropzone:hover, #dropzone.drag-over {
    border-color: var(--gold);
    border-style: solid;
    background: var(--s3);
  }
  #dropzone-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: #808080;
    pointer-events: none;
    user-select: none;
    letter-spacing: 0.06em;
    display: flex;
    align-items: center;
    gap: 12px;
    position: relative;
    z-index: 1;
  }
  #file-input { display: none; }

  /* プログレス */
  #prog-wrap {
    display: none;
    flex-direction: column;
    gap: 6px;
    margin: 10px 28px 0;
  }
  #prog-bar-bg { height: 1px; background: var(--line2); border-radius: 1px; overflow: hidden; }
  #prog-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), var(--teal));
    width: 0%;
    transition: width 0.2s;
    box-shadow: 0 0 6px var(--gold);
  }
  #prog-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--g2);
    letter-spacing: 0.06em;
    text-align: center;
  }

  /* テーブルメタ / 一括変更 */
  #table-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    height: 44px;
    padding: 0 28px;
    border-bottom: 1px solid var(--line);
    margin-top: 12px;
    flex-shrink: 0;
  }
  #bulk-month-wrap {
    margin-left: auto;
  }
  #bulk-month-wrap span {
    font-family: 'JetBrains Mono', monospace !important;
    font-size: 10px !important;
    letter-spacing: 0.06em !important;
    color: var(--g2) !important;
  }
  #bulk-month-wrap button {
    font-family: 'JetBrains Mono', monospace !important;
    font-size: 10px !important;
    letter-spacing: 0.08em !important;
    text-transform: uppercase !important;
    border-radius: 6px !important;
    height: 28px !important;
    padding: 0 12px !important;
    cursor: pointer !important;
    transition: all 0.15s !important;
    border: 1px solid var(--gold2) !important;
    background: var(--golddim) !important;
    color: var(--gold) !important;
  }
  #bulk-month-wrap button:hover {
    background: var(--gold) !important;
    color: var(--white) !important;
  }
  #bulk-date-cal-btn {
    border: 1px solid var(--line2) !important;
    background: var(--s2) !important;
    color: var(--g1) !important;
    padding: 0 !important;
    width: 28px !important;
    display: flex !important;
    align-items: center !important;
    justify-content: center !important;
    overflow: visible !important;
  }
  #bulk-date-cal-btn:hover {
    background: var(--s3) !important;
    border-color: var(--line3) !important;
  }
  #bulk-date-cal-btn svg {
    width: 14px !important;
    height: 14px !important;
    display: block !important;
    flex-shrink: 0 !important;
  }

  /* テーブルラッパー */
  #table-wrap {
    flex: 1;
    overflow-x: auto;
    overflow-y: hidden;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }

  /* 列ヘッダー */
  .col-header, .col-header-final {
    display: grid;
    align-items: center;
    padding: 0 28px;
    height: 32px;
    gap: 8px;
    flex-shrink: 0;
    background: var(--s1);
    border-bottom: 1px solid var(--line);
    min-width: max-content;
  }
  .col-header { grid-template-columns: 180px 130px 85px 90px 150px 80px 280px 36px; }
  .col-header-final { grid-template-columns: 200px 200px 120px 280px 36px; }
  .col-header span, .col-header-final span {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--g3);
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }

  /* 行コンテナ */
  #rows-container {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    display: flex;
    flex-direction: column;
  }

  /* 行 */
  .pdf-row, .pdf-row-final {
    display: grid;
    align-items: center;
    padding: 0 28px;
    height: 52px;
    gap: 8px;
    flex-shrink: 0;
    border-bottom: 1px solid var(--line);
    transition: background 0.1s;
    position: relative;
    min-width: max-content;
    width: 100%;
  }
  .pdf-row { grid-template-columns: 180px 130px 85px 90px 150px 80px 280px 36px; }
  .pdf-row-final { grid-template-columns: 200px 200px 120px 280px 36px; }
  .pdf-row:nth-child(even), .pdf-row-final:nth-child(even) { background: var(--s1); }
  .pdf-row:hover, .pdf-row-final:hover { background: var(--s2); }

  /* 元ファイル名セル */
  .cell-orig {
    display: flex; flex-direction: column;
    justify-content: center; overflow: hidden; gap: 3px;
  }
  .cell-orig .fname {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; color: var(--g2);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .cell-orig .tag-status {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; white-space: nowrap;
    display: flex; align-items: center;
  }
  .tag-ok   { color: var(--green); }
  .tag-ng   { color: var(--red); }
  .tag-warn { color: var(--gold); }

  /* Inputs */
  input[type="text"], input[type="number"] {
    background: var(--bg);
    border: 1px solid var(--line2);
    border-radius: 6px;
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    padding: 0 10px;
    height: 30px;
    width: 100%;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  input[type="number"] {
    font-family: 'JetBrains Mono', monospace;
    text-align: right; font-size: 11px;
  }
  input:focus {
    border-color: var(--gold2);
    box-shadow: 0 0 0 2px var(--golddim);
  }
  input[type="text"].date-input {
    color: var(--teal);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: 0.04em;
  }
  input::placeholder { color: var(--g3); font-size: 10px; }

  /* 請求の有無 */
  .x-btn {
    height: 28px;
    border-radius: 6px;
    border: 1px solid var(--line2);
    background: transparent;
    color: var(--g2);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; cursor: pointer; width: 100%;
    letter-spacing: 0.06em; transition: all 0.15s;
  }
  .x-btn:hover { border-color: var(--line3); color: var(--g1); }
  .x-btn.is-x { background: var(--reddim); border-color: var(--red); color: var(--red); }

  /* 訂正分 */
  .corr-wrap { display: flex; align-items: center; gap: 6px; cursor: pointer; }
  .corr-wrap input[type="checkbox"] { accent-color: var(--gold); width: 13px; height: 13px; }
  .corr-wrap span {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; color: var(--g2); user-select: none;
    letter-spacing: 0.1em; text-transform: uppercase;
  }

  /* プレビュー */
  .cell-preview {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; color: var(--teal);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .cell-preview.is-x { color: var(--red); }

  /* 削除 */
  .del-btn {
    background: transparent; border: none;
    color: var(--g3); font-size: 12px; cursor: pointer;
    width: 28px; height: 28px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .del-btn:hover { background: var(--reddim); color: var(--red); }

  /* ═══════════════════ FOOTER ═══════════════════ */
  footer {
    height: 68px;
    background: var(--s1);
    border-top: 1px solid var(--line);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 28px;
    gap: 14px;
    flex-shrink: 0;
    z-index: 10;
    position: relative;
  }

  #exec-btn {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: var(--gold);
    color: #0a0600;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 0 1px rgba(232,197,71,0.3), 0 4px 16px var(--goldglow);
    flex-shrink: 0;
  }
  #exec-btn:hover:not(:disabled) {
    background: #f0d060;
    box-shadow: 0 0 0 6px rgba(232,197,71,0.12), 0 6px 24px var(--goldglow);
    transform: scale(1.06);
  }
  #exec-btn:active:not(:disabled) { transform: scale(0.97); }
  #exec-btn:disabled { opacity: 0.2; cursor: not-allowed; box-shadow: none; transform: none; }

  #dl-one-btn {
    background: var(--gold);
    color: #0a0600;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    border: none;
    border-radius: 8px;
    padding: 0 24px;
    height: 38px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 0 1px rgba(232,197,71,0.3), 0 2px 8px var(--goldglow);
  }
  #dl-one-btn:hover:not(:disabled) {
    background: #f0d060;
    box-shadow: 0 4px 16px var(--goldglow);
  }
  #dl-zip-btn {
    background: transparent;
    color: var(--g1);
    border: 1px solid var(--line2);
    border-radius: 8px;
    padding: 0 20px;
    height: 38px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 400;
    cursor: pointer;
    transition: all 0.2s;
    display: flex; align-items: center; justify-content: center;
  }
  #dl-zip-btn:hover:not(:disabled) {
    background: var(--s2);
    border-color: var(--line3);
    color: var(--white);
  }
  #dl-one-btn:disabled, #dl-zip-btn:disabled { opacity: 0.2; cursor: not-allowed; }

  #back-btn {
    background: transparent;
    color: var(--g2);
    border: 1px solid var(--line2);
    border-radius: 8px;
    padding: 0 16px;
    height: 38px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex; align-items: center; justify-content: center;
  }
  #back-btn:hover { background: var(--s2); color: var(--g1); border-color: var(--line3); }

  #status-lbl {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--g2);
    letter-spacing: 0.06em;
    position: absolute;
    right: 28px;
  }

  /* スクロールバー */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--line3); border-radius: 4px; }

  /* CALポップアップ */
  .cal-popup {
    box-shadow: 0 24px 64px rgba(0,0,0,0.8),
                0 0 0 1px var(--line2),
                0 0 0 4px rgba(232,197,71,0.05) !important;
    border-radius: 10px !important;
  }
</style>
</head>
<body>

  <!-- SIDEBAR -->

// ── テキスト正規化 ──
function normalize(text) {
  // 全角スペース・半角スペース除去
  text = text.replace(/[\s\u3000]/g, '');
  // 全角記号→半角
  text = text.replace(/＃/g, '#').replace(/：/g, ':');
  // 全角数字→半角
  text = text.replace(/[０-９]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0));
  return text;
}

// ── タグパース ──
function parseTag(rawText) {
  const c = normalize(rawText);
  const idx = c.indexOf('##INV');
  const raw = idx >= 0 ? c.slice(idx, idx + 80) : '（タグなし）';

  // グループパターン: ##INV:名前:金額:日付:グループ:期間##
  let m = c.match(/##INV:([^:#]+):(-?\d+):(\d{8}):グループ:([^#]+)##/i);
  if (m) return { name: m[1], amount: parseInt(m[2]), date: m[3], period: m[4], found: true, isHoryuu: false, isGroup: true, raw };

  m = c.match(/##INV:([^:#]+):(-?\d+):(\d{7}):グループ:([^#]+)##/i);
  if (m) {
    const d = m[3];
    const date = d.slice(0,4) + '0' + d.slice(4);
    return { name: m[1], amount: parseInt(m[2]), date, period: m[4], found: true, isHoryuu: false, isGroup: true, raw };
  }

  // 保留確定パターン: ##INV:名前:金額:日付:保留確定##
  m = c.match(/##INV:([^:#]+):(-?\d+):(\d{8}):保留確定##/i);
  if (m) return { name: m[1], amount: parseInt(m[2]), date: m[3], period: null, found: true, isHoryuu: true, isGroup: false, raw };

  m = c.match(/##INV:([^:#]+):(-?\d+):(\d{7}):保留確定##/i);
  if (m) {
    const d = m[3];
    const date = d.slice(0, 4) + '0' + d.slice(4);
    return { name: m[1], amount: parseInt(m[2]), date, period: null, found: true, isHoryuu: true, isGroup: false, raw };
  }

  // パターン1: 8桁日付
  m = c.match(/##INV:([^:#]+):(-?\d+):(\d{8})##/i);
  if (m) return { name: m[1], amount: parseInt(m[2]), date: m[3], period: null, found: true, isHoryuu: false, isGroup: false, raw };

  // パターン2: 7桁日付
  m = c.match(/##INV:([^:#]+):(-?\d+):(\d{7})##/i);
  if (m) {
    const d = m[3];
    const date = d.slice(0, 4) + '0' + d.slice(4);
    return { name: m[1], amount: parseInt(m[2]), date, period: null, found: true, isHoryuu: false, isGroup: false, raw };
  }

  // パターン3: 日付なし
  m = c.match(/##INV:([^:#]+):(-?\d+)##/i);
  if (m) return { name: m[1], amount: parseInt(m[2]), date: null, period: null, found: true, isHoryuu: false, isGroup: false, raw };

  return { name: '', amount: -1, date: null, period: null, found: false, isHoryuu: false, isGroup: false, raw };
}

// ── PDF テキスト抽出 ──
async function extractText(file) {
  try {
    const arrayBuffer = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
    let text = '';
    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const content = await page.getTextContent();
      text += content.items.map(item => item.str).join('');
    }
    return text;
  } catch (e) {
    return '';
  }
}

// ── ファイル名生成（日払い） ──
function buildFilename(name, amount, date, isX, isCorrection, dupPrefix) {
  const prefix = isX ? '×' : '';
  const dateStr = date || '????????';
  let base = `${prefix}日払い請求書${dateStr}${name}様`;
  if (isCorrection) base += ' 訂正分';
  if (dupPrefix) base = dupPrefix + ' ' + base;
  return base + '.pdf';
}

// ── ファイル名生成（最終請求） ──
let bulkIssueDate = null; // null = 実行当日、'yyyymmdd' = 一括指定日

function buildFilenameFinal(name, month) {
  let dateStr;
  if (bulkIssueDate && bulkIssueDate.length === 8) {
    dateStr = bulkIssueDate;
  } else {
    const today = new Date();
    const yyyy = today.getFullYear();
    const mm   = String(today.getMonth() + 1).padStart(2, '0');
    const dd   = String(today.getDate()).padStart(2, '0');
    dateStr = `${yyyy}${mm}${dd}`;
  }
  const m = month ? parseInt(month, 10) : '?';
  return `${name}様 請求書 ${m}月最終請求 ${dateStr}.pdf`;
}

// ── ファイル名生成（保留確定） ──
function buildFilenameHoryuu(name, date, isCorrection) {
  const dateStr = date || '????????';
  let base = `保留確定請求書${dateStr}${name}様`;
  if (isCorrection) base += ' 訂正分';
  return base + '.pdf';
}

// ── ファイル名生成（グループ用請求） ──
function buildFilenameGroup(name, date, period, isCorrection) {
  const dateStr   = date   || '????????';
  const periodStr = period || '??-??';
  let base = `${name}様 請求書 ${periodStr}稼働分 ${dateStr}`;
  if (isCorrection) base += ' 訂正分';
  return base + '.pdf';
}

// ── 重複検出 ──
function detectDuplicates(rows) {
  const nameCount = {};
  rows.forEach(r => {
    const key = buildFilename(r.name, r.amount, r.date, r.isX, r.isCorrection, '');
    nameCount[key] = (nameCount[key] || 0) + 1;
  });
  const tracker = {};
  let dupTotal = 0;
  rows.forEach(r => {
    const key = buildFilename(r.name, r.amount, r.date, r.isX, r.isCorrection, '');
    if (nameCount[key] > 1) {
      tracker[key] = (tracker[key] || 0) + 1;
      r.dupPrefix = tracker[key] === 1 ? '' : `※重複データ${tracker[key] - 1}`;
      if (tracker[key] > 1) dupTotal++;
    } else {
      r.dupPrefix = '';
    }
  });
  return dupTotal;
}

// ── ファイル処理 ──
async function processFiles(files) {
  pdfRows = [];
  rowsContainer.innerHTML = '';
  execBtn.disabled = true;
  statusLbl.textContent = '';
  countLbl.textContent = '解析中…';
  dupLbl.textContent = '';
  progWrap.style.display = 'flex';
  progBar.style.width = '0%';

  for (let i = 0; i < files.length; i++) {
    const f = files[i];
    progBar.style.width = `${Math.round(i / files.length * 100)}%`;
    progLabel.textContent = `解析中 ${i + 1}/${files.length}  ${f.name}`;

    const text = await extractText(f);
    const p = parseTag(text);

    // タグ日付から月を抽出（例: 20260331 → '03' → 3）
    const month = (p.date && p.date.length >= 6) ? parseInt(p.date.slice(4, 6), 10) : null;

    pdfRows.push({
      file: f,
      orig: f.name,
      name: p.name,
      amount: p.amount,
      date: p.date,
      month: month,
      period: p.period,
      isX: p.amount === 0,
      isCorrection: false,
      isHoryuu: p.isHoryuu,
      isGroup: p.isGroup,
      found: p.found,
      raw: p.raw,
      dupPrefix: ''
    });
  }

  progBar.style.width = '100%';
  progLabel.textContent = '';
  setTimeout(() => { progWrap.style.display = 'none'; }, 400);

  renderRows();
}

// ── レンダリング ──
function renderRows() {
  rowsContainer.innerHTML = '';
  if (pdfRows.length === 0) {
    countLbl.textContent = '';
    dupLbl.textContent = '';
    execBtn.disabled = true;
    bulkMonthWrap.style.display = 'none';
    return;
  }

  // 最終請求モードのときだけ一括変更UIを表示
  if (currentMode === 'final') {
    bulkMonthWrap.style.display = 'flex';
  }

  const found = pdfRows.filter(r => r.found).length;
  const notFound = pdfRows.length - found;
  countLbl.textContent = `  ${found}件 タグ自動検出` + (notFound ? `  ／  ${notFound}件 タグなし` : '');

  if (currentMode === 'final') {
    pdfRows.forEach((r, idx) => addRowFinal(idx));
    execBtn.disabled = !pdfRows.some(r => !r.isHoryuu && !r.isGroup && r.name);
    dupLbl.textContent = '';
  } else if (currentMode === 'horyuu') {
    pdfRows.forEach((r, idx) => addRowHoryuu(idx));
    execBtn.disabled = !pdfRows.some(r => r.isHoryuu && r.name && r.date);
    dupLbl.textContent = '';
  } else if (currentMode === 'group') {
    pdfRows.forEach((r, idx) => addRowGroup(idx));
    execBtn.disabled = !pdfRows.some(r => r.isGroup && r.name && r.date);
    dupLbl.textContent = '';
  } else {
    // 日払いモード
    const dupTotal = detectDuplicates(pdfRows);
    dupLbl.innerHTML = dupTotal > 0 ? `${ICON.warn} 重複データが ${dupTotal} 件あります。ご確認ください。` : '';
    pdfRows.forEach((r, idx) => addRow(idx));
    execBtn.disabled = !pdfRows.some(r => !r.isHoryuu && !r.isGroup && r.name && r.date);
  }
}

function addRow(idx) {
  const r = pdfRows[idx];

  const row = document.createElement('div');
  row.className = 'pdf-row';
  row.dataset.idx = idx;

  // 保留確定タグが含まれている場合はエラー表示
  if (r.isHoryuu) {
    row.innerHTML = `
      <div class="cell-orig">
        <div class="fname" title="${r.orig}">${r.orig.length > 22 ? r.orig.slice(0,22)+'…' : r.orig}</div>
        <div class="tag-status tag-ng">${ICON.cross} 保留確定タグ検出</div>
      </div>
      <div style="grid-column:2/8; display:flex; align-items:center;">
        <span style="color:var(--red); font-size:13px; font-weight:700;">こちらは保留確定請求書です。日払い請求書ではありません。</span>
      </div>
      <div><button class="del-btn" title="削除">✕</button></div>
    `;
    row.querySelector('.del-btn').addEventListener('click', () => { pdfRows.splice(idx, 1); renderRows(); });
    rowsContainer.appendChild(row);
    return;
  }

  // グループタグが含まれている場合はエラー表示
  if (r.isGroup) {
    row.innerHTML = `
      <div class="cell-orig">
        <div class="fname" title="${r.orig}">${r.orig.length > 22 ? r.orig.slice(0,22)+'…' : r.orig}</div>
        <div class="tag-status tag-ng">${ICON.cross} グループタグ検出</div>
      </div>
      <div style="grid-column:2/8; display:flex; align-items:center;">
        <span style="color:var(--red); font-size:13px; font-weight:700;">こちらはグループ用請求書です。日払い請求書ではありません。</span>
      </div>
      <div><button class="del-btn" title="削除">✕</button></div>
    `;
    row.querySelector('.del-btn').addEventListener('click', () => { pdfRows.splice(idx, 1); renderRows(); });
    rowsContainer.appendChild(row);
    return;
  }

  const fname = buildFilename(r.name, r.amount, r.date, r.isX, r.isCorrection, r.dupPrefix);

  row.className = 'pdf-row';
  row.dataset.idx = idx;

  // タグ状態テキスト
  let tagClass, tagText;
  if (r.found && r.date) { tagClass = 'tag-ok'; tagText = `${ICON.check} タグ検出 ${ICON.cal} ${r.date}`; }
  else if (r.found)       { tagClass = 'tag-warn'; tagText = `${ICON.check} タグ検出 ${ICON.warn} 日付なし`; }
  else                     { tagClass = 'tag-ng'; tagText = `${ICON.cross} タグなし`; }

  const amtDisplay = r.amount !== -1 ? r.amount : '';
  const isXClass = r.isX ? 'is-x' : '';
  const xText = r.isX ? '請求なし' : '請求あり';
  const prevClass = (r.isX || r.dupPrefix) ? 'is-x' : '';

  row.innerHTML = `
    <div class="cell-orig">
      <div class="fname" title="${r.orig}">${r.orig.length > 22 ? r.orig.slice(0,22)+'…' : r.orig}</div>

    <div><input type="number" class="amt-input" value="${amtDisplay}" placeholder="0"></div>
    <div><button class="x-btn ${isXClass}">${xText}</button></div>
    <div><input type="text" class="date-input" value="${r.date || ''}" placeholder="yyyymmdd" maxlength="8"></div>

      <label class="corr-wrap">
        <input type="checkbox" class="corr-check" ${r.isCorrection ? 'checked' : ''}>
        <span>訂正分</span>
      </label>
    </div>
    <div class="cell-preview ${prevClass}" title="${fname}">${fname}</div>
    <div><button class="del-btn" title="削除">✕</button></div>
  `;

  // Event listeners
  const nameInput = row.querySelector('.name-input');
  const amtInput  = row.querySelector('.amt-input');
  const dateInput = row.querySelector('.date-input');
  const xBtn      = row.querySelector('.x-btn');
  const corrCheck = row.querySelector('.corr-check');
  const preview   = row.querySelector('.cell-preview');
  const delBtn    = row.querySelector('.del-btn');

  const refresh = () => {
    const name = nameInput.value.trim();
    const amt  = amtInput.value !== '' ? parseInt(amtInput.value) : -1;
    const date = dateInput.value.trim() || null;
    const isX  = r.isX;
    const isC  = corrCheck.checked;

    pdfRows[idx].name = name;
    pdfRows[idx].amount = amt;
    pdfRows[idx].date = date;
    pdfRows[idx].isCorrection = isC;
    if (amt === 0 && !isX) { pdfRows[idx].isX = true; }

    detectDuplicates(pdfRows);
    const fn = buildFilename(pdfRows[idx].name, pdfRows[idx].amount, pdfRows[idx].date,
                              pdfRows[idx].isX, pdfRows[idx].isCorrection, pdfRows[idx].dupPrefix);
    preview.textContent = fn;
    preview.title = fn;
    preview.className = 'cell-preview' + ((pdfRows[idx].isX || pdfRows[idx].dupPrefix) ? ' is-x' : '');

    const ready = pdfRows.some(r => r.name && r.date);
    execBtn.disabled = !ready;

    const dupTotal = pdfRows.filter(r => r.dupPrefix && r.dupPrefix !== '').length;
    dupLbl.innerHTML = dupTotal > 0 ? `${ICON.warn} 重複データが ${dupTotal} 件あります。ご確認ください。` : '';
  };

  xBtn.addEventListener('click', () => {
    pdfRows[idx].isX = !pdfRows[idx].isX;
    xBtn.textContent = pdfRows[idx].isX ? '請求なし' : '請求あり';
    xBtn.className = 'x-btn' + (pdfRows[idx].isX ? ' is-x' : '');
    refresh();
  });

  nameInput.addEventListener('input', refresh);
  amtInput.addEventListener('input', refresh);
  dateInput.addEventListener('input', refresh);
  corrCheck.addEventListener('change', refresh);

  delBtn.addEventListener('click', () => {
    pdfRows.splice(idx, 1);
    renderRows();
  });

  rowsContainer.appendChild(row);
}

// ── ダウンロード（個別） ──
function downloadFile(r) {
  const fn = currentMode === 'final'
    ? buildFilenameFinal(r.name, r.month)
    : currentMode === 'horyuu'
    ? buildFilenameHoryuu(r.name, r.date, r.isCorrection)
    : currentMode === 'group'
    ? buildFilenameGroup(r.name, r.date, r.period, r.isCorrection)
    : buildFilename(r.name, r.amount, r.date, r.isX, r.isCorrection, r.dupPrefix);
  const url = URL.createObjectURL(r.file);
  const a = document.createElement('a');
  a.href = url;
  a.download = fn;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

// ── 1件ずつダウンロード ──
dlOneBtn.addEventListener('click', async () => {
  const items = currentMode === 'final'
    ? pdfRows.filter(r => !r.isHoryuu && !r.isGroup && r.name)
    : currentMode === 'horyuu'
    ? pdfRows.filter(r => r.isHoryuu && r.name && r.date)
    : currentMode === 'group'
    ? pdfRows.filter(r => r.isGroup && r.name && r.date)
    : pdfRows.filter(r => !r.isHoryuu && !r.isGroup && r.name && r.date);
  if (!items.length) return;
  dlOneBtn.disabled = true;
  dlZipBtn.disabled = true;
  statusLbl.textContent = '処理中…';
  for (let i = 0; i < items.length; i++) {
    await new Promise(res => setTimeout(res, i === 0 ? 0 : 300));
    downloadFile(items[i]);
    statusLbl.textContent = `ダウンロード中 ${i + 1}/${items.length}`;
  }
  statusLbl.innerHTML = `${ICON.check} ${items.length}件 完了`;
  statusLbl.style.color = 'var(--green)';
  dlOneBtn.disabled = false;
  dlZipBtn.disabled = false;
});

// ── ZIPにまとめてDL ──
dlZipBtn.addEventListener('click', async () => {
  const items = currentMode === 'final'
    ? pdfRows.filter(r => !r.isHoryuu && !r.isGroup && r.name)
    : currentMode === 'horyuu'
    ? pdfRows.filter(r => r.isHoryuu && r.name && r.date)
    : currentMode === 'group'
    ? pdfRows.filter(r => r.isGroup && r.name && r.date)
    : pdfRows.filter(r => !r.isHoryuu && !r.isGroup && r.name && r.date);
  if (!items.length) return;
  if (!window.JSZip) {
    statusLbl.textContent = 'ZIPライブラリを読み込み中…';
    await loadScript('https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js');
  }
  statusLbl.textContent = 'ZIP作成中…';
  statusLbl.style.color = 'var(--text3)';
  dlOneBtn.disabled = true;
  dlZipBtn.disabled = true;
  const zip = new JSZip();
  for (const r of items) {
    const fn = currentMode === 'final'
      ? buildFilenameFinal(r.name, r.month)
      : currentMode === 'horyuu'
      ? buildFilenameHoryuu(r.name, r.date, r.isCorrection)
      : currentMode === 'group'
      ? buildFilenameGroup(r.name, r.date, r.period, r.isCorrection)
      : buildFilename(r.name, r.amount, r.date, r.isX, r.isCorrection, r.dupPrefix);
    const buf = await r.file.arrayBuffer();
    zip.file(fn, buf);
  }
  const blob = await zip.generateAsync({ type: 'blob' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  if (currentMode === 'final') {
    const month = items[0].month || '?';
    a.download = `${month}月最終請求.zip`;
  } else if (currentMode === 'horyuu') {
    const firstDate = items[0].date || '';
    const day = firstDate.length >= 8 ? parseInt(firstDate.slice(6, 8)) : '';
    a.download = day ? `${day}日発行分.zip` : '保留確定請求書.zip';
  } else if (currentMode === 'group') {
    const firstDate = items[0].date || '';
    const day = firstDate.length >= 8 ? parseInt(firstDate.slice(6, 8)) : '';
    a.download = day ? `${day}日発行分.zip` : 'グループ用請求書.zip';
  } else {
    const firstDate = items[0].date || '';
    const day = firstDate.length >= 8 ? parseInt(firstDate.slice(6, 8)) : '';
    a.download = day ? `${day}日稼働分.zip` : '日払い請求書.zip';
  }
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 2000);
  statusLbl.innerHTML = `${ICON.check} ZIP完了 (${items.length}件)`;
  statusLbl.style.color = 'var(--green)';
  dlOneBtn.disabled = false;
  dlZipBtn.disabled = false;
});

// ── Script動的ロード ──
function loadScript(src) {
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = src;
    s.onload = resolve;
    s.onerror = reject;
    document.head.appendChild(s);
  });
}

// ── カレンダーポップアップ ──
function openCalendar(anchorEl, dateVarObj, callback) {
  document.querySelectorAll('.cal-popup').forEach(e => e.remove());

  const current = dateVarObj.get();
  let selYear, selMonth, selDay;
  if (/^\d{8}$/.test(current)) {
    selYear  = parseInt(current.slice(0,4));
    selMonth = parseInt(current.slice(4,6)) - 1;
    selDay   = parseInt(current.slice(6,8));
  } else {
    const t = new Date();
    selYear = t.getFullYear(); selMonth = t.getMonth(); selDay = t.getDate();
  }
  let viewYear = selYear, viewMonth = selMonth;

  const DAYS   = ['月','火','水','木','金','土','日'];
  const MONTHS = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

  const pop = document.createElement('div');
  pop.className = 'cal-popup';
  pop.style.cssText = `position:fixed;z-index:9999;background:#0a0a0c;border:1px solid #1e2028;
    border-radius:8px;box-shadow:0 8px 32px rgba(0,0,0,0.7);user-select:none;min-width:260px;`;

  function render() {
    const today = new Date();
    const firstDay = new Date(viewYear, viewMonth, 1).getDay();
    const daysInMonth = new Date(viewYear, viewMonth+1, 0).getDate();
    const startCol = (firstDay + 6) % 7;
    let cells = [];
    for (let i = 0; i < startCol; i++) cells.push('');
    for (let d = 1; d <= daysInMonth; d++) cells.push(d);
    while (cells.length % 7 !== 0) cells.push('');

    let rows = '';
    for (let i = 0; i < cells.length; i += 7) {
      rows += '<tr>';
      for (let j = 0; j < 7; j++) {
        const d = cells[i+j];
        const isToday = d && viewYear===today.getFullYear() && viewMonth===today.getMonth() && d===today.getDate();
        const isSel   = d && viewYear===selYear && viewMonth===selMonth && d===selDay;
        const isSat = j===5, isSun = j===6;
        let bg = 'transparent', fg = isSat ? '#4ab8d4' : isSun ? '#e05252' : '#eef0f4';
        if (isSel)        { bg='#e8c547'; fg='#000'; }
        else if (isToday) { bg='#1e2028'; fg='#e8c547'; }
        rows += `<td data-d="${d||''}" style="width:34px;height:32px;text-align:center;border-radius:4px;cursor:${d?'pointer':'default'};background:${bg};color:${d?fg:'transparent'};font-size:13px;">${d||''}</td>`;
      }
      rows += '</tr>';
    }

    pop.innerHTML = `
      <div style="background:#111318;padding:10px 12px;display:flex;align-items:center;justify-content:space-between;border-radius:8px 8px 0 0;">
        <span class="cal-prev" style="cursor:pointer;font-size:18px;color:#eef0f4;padding:0 8px;">‹</span>
        <span style="font-size:13px;font-weight:700;color:#eef0f4;">${viewYear}年 ${MONTHS[viewMonth]}</span>
        <span class="cal-next" style="cursor:pointer;font-size:18px;color:#eef0f4;padding:0 8px;">›</span>
      </div>
      <div style="padding:8px 12px 12px;">
        <table style="border-collapse:collapse;width:100%;">
          <thead><tr>${DAYS.map((d,i)=>`<th style="font-size:10px;color:${i===5?'#4ab8d4':i===6?'#e05252':'#6b7280'};padding-bottom:4px;font-weight:400;">${d}</th>`).join('')}</tr></thead>
          <tbody>${rows}</tbody>
        </table>
        <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:8px;">
          <span class="cal-cancel" style="cursor:pointer;font-size:11px;color:#6b7280;padding:4px 8px;">キャンセル</span>
          <span class="cal-ok" style="cursor:pointer;font-size:11px;font-weight:700;background:#e8c547;color:#000;padding:4px 12px;border-radius:4px;">決　定</span>
        </div>
      </div>`;

    pop.querySelector('.cal-prev').onclick = () => { viewMonth--; if(viewMonth<0){viewMonth=11;viewYear--;} render(); };
    pop.querySelector('.cal-next').onclick = () => { viewMonth++; if(viewMonth>11){viewMonth=0;viewYear++;} render(); };
    pop.querySelectorAll('td[data-d]').forEach(td => {
      if (!td.dataset.d) return;
      td.onmouseenter = () => { if(!(viewYear===selYear&&viewMonth===selMonth&&parseInt(td.dataset.d)===selDay)) td.style.background='#16181f'; };
      td.onmouseleave = () => { if(!(viewYear===selYear&&viewMonth===selMonth&&parseInt(td.dataset.d)===selDay)) td.style.background='transparent'; };
      td.onclick = () => { selYear=viewYear; selMonth=viewMonth; selDay=parseInt(td.dataset.d); render(); };
    });
    pop.querySelector('.cal-ok').onclick = () => {
      const mm = String(selMonth+1).padStart(2,'0');
      const dd = String(selDay).padStart(2,'0');
      dateVarObj.set(`${selYear}${mm}${dd}`);
      if (callback) callback();
      pop.remove();
    };
    pop.querySelector('.cal-cancel').onclick = () => pop.remove();
  }

  render();
  document.body.appendChild(pop);
  pop.addEventListener('click', e => e.stopPropagation());
  pop.style.left = `${(window.innerWidth  - pop.offsetWidth)  / 2}px`;
  pop.style.top  = `${(window.innerHeight - pop.offsetHeight) / 2}px`;

  setTimeout(() => {
    document.addEventListener('click', function handler(e) {
      if (!pop.contains(e.target)) { pop.remove(); document.removeEventListener('click', handler); }
    });
  }, 0);
}

// ── エスケープ ──
function escHtml(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
